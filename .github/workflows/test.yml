name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.12", "3.13", "3.14" ]
        exclude:
          # kuzu has no cp314 wheel for Windows yet, so it falls back to a
          # source build that needs `make`, which the windows-latest runner
          # doesn't have. Drop until upstream publishes a win_amd64 wheel:
          # https://pypi.org/project/kuzu/#files
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run linting
        run: |
          uv run ruff check --diff .
          uv run ruff format --check --diff .

      - name: Check Markdown formatting
        run: uv run mdformat --check README.md CHANGELOG.md docs/

      - name: Run mypy
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
